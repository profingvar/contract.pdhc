server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /docs/ {
        alias /usr/share/nginx/docs/;
        add_header Content-Type 'text/markdown; charset=utf-8';
        add_header Content-Disposition 'attachment';
    }
}
