# ─── contract.pdhc.se ─── ISOLATED ─── HTTP-only (pre-cert) ───
# Phase 1: HTTP proxy + ACME challenge. Replace with _ssl version after cert.
# Install: sudo cp contract.pdhc.se.conf /opt/homebrew/etc/nginx/sites-available/contract.pdhc.se.conf
#          sudo ln -s /opt/homebrew/etc/nginx/sites-available/contract.pdhc.se.conf \
#                     /opt/homebrew/etc/nginx/sites-enabled/contract.pdhc.se.conf
#          sudo nginx -t && sudo nginx -s reload

upstream contract_pdhc_backend {
    server 127.0.0.1:9022;
}

upstream contract_pdhc_api {
    server 127.0.0.1:9021;
}

server {
    listen 80;
    server_name contract.pdhc.se;

    location ^~ /.well-known/acme-challenge/ {
        root /usr/local/www/contract.pdhc/acme;
        default_type text/plain;
    }

    # API endpoints
    location /health {
        proxy_pass http://contract_pdhc_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fhir/ {
        proxy_pass http://contract_pdhc_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://contract_pdhc_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 16M;
    }

    # SPA frontend
    location / {
        proxy_pass http://contract_pdhc_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
