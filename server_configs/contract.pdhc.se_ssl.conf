# ─── contract.pdhc.se ─── ISOLATED ─── FULL HTTPS ───
# Replace the HTTP-only config after SSL cert is obtained.
# Install: sudo cp contract.pdhc.se_ssl.conf /opt/homebrew/etc/nginx/sites-available/contract.pdhc.se.conf
#          sudo nginx -t && sudo nginx -s reload

upstream contract_pdhc_backend {
    server 127.0.0.1:9022;
}

upstream contract_pdhc_api {
    server 127.0.0.1:9021;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name contract.pdhc.se;

    location ^~ /.well-known/acme-challenge/ {
        root /usr/local/www/contract.pdhc/acme;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name contract.pdhc.se;

    # ── SSL ──
    ssl_certificate     /etc/letsencrypt/live/contract.pdhc.se/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/contract.pdhc.se/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API endpoints ──
    location /health {
        proxy_pass http://contract_pdhc_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fhir/ {
        proxy_pass http://contract_pdhc_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://contract_pdhc_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 16M;
    }

    # ── SPA frontend ──
    location / {
        proxy_pass http://contract_pdhc_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
